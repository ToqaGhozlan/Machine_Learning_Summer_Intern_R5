<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Fare Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚖 Uber Fare Prediction</h1>

    <p class="subtitle">
        Enter trip information to predict the fare.
    </p>

    <form action="/predict" method="POST">

        <div class="grid">

            <div class="input-group">
                <label>Passenger Count</label>
                <input
                    type="number"
                    name="passenger_count"
                    min="1"
                    max="6"
                    required>
            </div>

            <div class="input-group">
                <label>Car Condition</label>
                <select name="car_condition">

                    <option value="0">Poor</option>
                    <option value="1">Fair</option>
                    <option value="2">Good</option>
                    <option value="3">Excellent</option>

                </select>
            </div>

            <div class="input-group">
                <label>Weather</label>

                <select name="weather">

                    <option value="sunny">Sunny</option>
                    <option value="cloudy">Cloudy</option>
                    <option value="rainy">Rainy</option>
                    <option value="stormy">Stormy</option>
                    <option value="windy">Windy</option>

                </select>
            </div>

            <div class="input-group">
                <label>Traffic Condition</label>

                <select name="traffic">

                    <option value="Flow Traffic">Flow Traffic</option>
                    <option value="Congested Traffic">Congested Traffic</option>

                </select>
            </div>

            <div class="input-group">
                <label>Pickup Latitude</label>

                <input
                    type="number"
                    step="any"
                    name="pickup_latitude"
                    required>
            </div>

            <div class="input-group">
                <label>Pickup Longitude</label>

                <input
                    type="number"
                    step="any"
                    name="pickup_longitude"
                    required>
            </div>

            <div class="input-group">
                <label>Dropoff Latitude</label>

                <input
                    type="number"
                    step="any"
                    name="dropoff_latitude"
                    required>
            </div>

            <div class="input-group">
                <label>Dropoff Longitude</label>

                <input
                    type="number"
                    step="any"
                    name="dropoff_longitude"
                    required>
            </div>

            <div class="input-group">
                <label>Distance (km)</label>

                <input
                    type="number"
                    step="0.01"
                    min="0"
                    name="distance"
                    placeholder="Enter trip distance"
                    required>
            </div>

            <div class="input-group full-width">
                <label>Pickup Date & Time</label>

                <input
                    type="datetime-local"
                    name="pickup_datetime"
                    required>
            </div>

        </div>

        <button type="submit">
            Predict Fare
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        Predicted Fare

        <br><br>

        <strong>${{ prediction }}</strong>

    </div>

    {% endif %}

</div>

</body>

</html>
