<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NY Fare Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="48" height="48" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="32" fill="#1a1a1a"/>
                <path d="M14 38l4-12c0.6-1.8 2.3-3 4.2-3h19.6c1.9 0 3.6 1.2 4.2 3l4 12"
                      stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <rect x="12" y="38" width="40" height="9" rx="3" fill="#ffffff"/>
                <circle cx="21" cy="49" r="4" fill="#1a1a1a" stroke="#ffffff" stroke-width="2"/>
                <circle cx="43" cy="49" r="4" fill="#1a1a1a" stroke="#ffffff" stroke-width="2"/>
            </svg>
        </div>
        <h1>Fare Predictor</h1>
        <p class="subtitle">Enter your trip details to get an estimated fare</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/">
            <div class="form-group">
                <label for="pickup_address">Pickup Address *</label>
                <input type="text" id="pickup_address" name="pickup_address"
                       placeholder="e.g. Times Square, New York, NY" required>
            </div>

            <div class="form-group">
                <label for="dropoff_address">Dropoff Address *</label>
                <input type="text" id="dropoff_address" name="dropoff_address"
                       placeholder="e.g. JFK Airport, New York, NY" required>
            </div>

            <div class="form-group">
                <label for="trip_datetime">Trip Date & Time *</label>
                <input type="datetime-local" id="trip_datetime" name="trip_datetime" required>
            </div>

            <button type="submit">Predict Fare</button>
        </form>
    </div>
</body>
</html>
