<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>توقع أجرة Uber</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🚕 توقع أجرة الرحلة</h1>

        {% if errors %}
        <div class="errors">
            <strong>فيه مشكلة في البيانات اللي دخلتها:</strong>
            <ul>
                {% for error in errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form action="/predict" method="POST">

            <label for="trip_datetime">تاريخ ووقت الرحلة *</label>
            <input type="datetime-local" id="trip_datetime" name="trip_datetime" required>

            <label for="pickup_latitude">Pickup Latitude (خط العرض) *</label>
            <input type="number" step="any" id="pickup_latitude" name="pickup_latitude"
                   min="-90" max="90" placeholder="مثال: 40.7128" required>

            <label for="pickup_longitude">Pickup Longitude (خط الطول) *</label>
            <input type="number" step="any" id="pickup_longitude" name="pickup_longitude"
                   min="-180" max="180" placeholder="مثال: -74.0060" required>

            <label for="dropoff_latitude">Dropoff Latitude (خط العرض) *</label>
            <input type="number" step="any" id="dropoff_latitude" name="dropoff_latitude"
                   min="-90" max="90" placeholder="مثال: 40.7580" required>

            <label for="dropoff_longitude">Dropoff Longitude (خط الطول) *</label>
            <input type="number" step="any" id="dropoff_longitude" name="dropoff_longitude"
                   min="-180" max="180" placeholder="مثال: -73.9855" required>

            <label for="passenger_count">عدد الركاب *</label>
            <input type="number" id="passenger_count" name="passenger_count"
                   min="1" max="6" value="1" required>

            <label for="car_condition">حالة العربية *</label>
            <select id="car_condition" name="car_condition" required>
                <option value="Bad">Bad</option>
                <option value="Good" selected>Good</option>
                <option value="Very Good">Very Good</option>
                <option value="Excellent">Excellent</option>
            </select>

            <label for="traffic_condition">حالة الزحمة *</label>
            <select id="traffic_condition" name="traffic_condition" required>
                <option value="Flow Traffic" selected>Flow Traffic</option>
                <option value="Dense Traffic">Dense Traffic</option>
                <option value="Congested Traffic">Congested Traffic</option>
            </select>

            <label for="weather">حالة الطقس *</label>
            <select id="weather" name="weather" required>
                <option value="sunny" selected>Sunny</option>
                <option value="rainy">Rainy</option>
                <option value="windy">Windy</option>
                <option value="cloudy">Cloudy</option>
                <option value="stormy">Stormy</option>
            </select>

            <button type="submit">احسب الأجرة المتوقعة</button>
        </form>
    </div>
</body>
</html>
