<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>النتيجة - توقع أجرة Uber</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>✅ النتيجة</h1>

        <div class="result-box">
            <p class="fare-label">الأجرة المتوقعة</p>
            <p class="fare-value">${{ fare }}</p>
        </div>

        <div class="details">
            <h3>تفاصيل الرحلة اللي دخلتها:</h3>
            <ul>
                <li>عدد الركاب: {{ inputs.passenger_count }}</li>
                <li>حالة العربية: {{ inputs.car_condition }}</li>
                <li>حالة الزحمة: {{ inputs.traffic_condition }}</li>
                <li>الطقس: {{ inputs.weather }}</li>
                <li>وقت الرحلة: {{ inputs.trip_datetime }}</li>
            </ul>
        </div>

        <a href="/" class="back-link">↩ عمل تنبؤ تاني</a>
    </div>
</body>
</html>
