<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Taxi Fare Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Taxi Fare Prediction System</h1>

    <form action="/predict" method="POST">

        <!-- =============================== -->
        <!-- Trip Information -->
        <!-- =============================== -->

        <h2>Trip Information</h2>

        <label>Passenger Count</label>
        <input
            type="number"
            name="passenger_count"
            min="1"
            max="8"
            value="1"
            required
        >

        <label>Hour</label>
        <input
            type="number"
            name="hour"
            min="0"
            max="23"
            value="12"
            required
        >

        <label>Day</label>
        <input
            type="number"
            name="day"
            min="1"
            max="31"
            value="15"
            required
        >

        <label>Month</label>
        <input
            type="number"
            name="month"
            min="1"
            max="12"
            value="6"
            required
        >

        <label>Weekday</label>

        <select name="weekday">

            <option value="0">Monday</option>
            <option value="1">Tuesday</option>
            <option value="2">Wednesday</option>
            <option value="3">Thursday</option>
            <option value="4">Friday</option>
            <option value="5">Saturday</option>
            <option value="6">Sunday</option>

        </select>

        <label>Year</label>
        <input
            type="number"
            name="year"
            min="2000"
            max="2035"
            value="2009"
            required
        >

        <!-- =============================== -->
        <!-- Pickup & Dropoff -->
        <!-- =============================== -->

        <h2>Pickup Location</h2>

        <label>Pickup Latitude</label>
        <input
            type="number"
            step="any"
            name="pickup_latitude"
            placeholder="e.g. 40.7128"
            required
        >

        <label>Pickup Longitude</label>
        <input
            type="number"
            step="any"
            name="pickup_longitude"
            placeholder="e.g. -73.935242"
            required
        >

        <label>Dropoff Latitude</label>
        <input
            type="number"
            step="any"
            name="dropoff_latitude"
            placeholder="e.g. 40.7580"
            required
        >

        <label>Dropoff Longitude</label>
        <input
            type="number"
            step="any"
            name="dropoff_longitude"
            placeholder="e.g. -73.9855"
            required
        >

        <!-- =============================== -->
        <!-- Distance Features -->
        <!-- =============================== -->

        <h2>Distance Features</h2>

        <label>Trip Distance</label>
        <input
            type="number"
            step="any"
            name="distance"
            min="0"
            placeholder="Distance in km"
            required
        >

        <label>Bearing</label>
        <input
            type="number"
            step="any"
            name="bearing"
            placeholder="Bearing"
            required
        >

        <label>Distance to JFK Airport</label>
        <input
            type="number"
            step="any"
            name="jfk_dist"
            min="0"
            required
        >

        <label>Distance to Newark Airport (EWR)</label>
        <input
            type="number"
            step="any"
            name="ewr_dist"
            min="0"
            required
        >

        <label>Distance to LaGuardia Airport (LGA)</label>
        <input
            type="number"
            step="any"
            name="lga_dist"
            min="0"
            required
        >

        <label>Distance to Statue of Liberty</label>
        <input
            type="number"
            step="any"
            name="sol_dist"
            min="0"
            required
        >

        <label>Distance to NYC Center</label>
        <input
            type="number"
            step="any"
            name="nyc_dist"
            min="0"
            required
        >

        <!-- =============================== -->
        <!-- Trip Conditions -->
        <!-- =============================== -->

        <h2>Trip Conditions</h2>

        <label>Car Condition</label>

        <select name="car_condition">

            <option value="0">Bad</option>
            <option value="1">Excellent</option>
            <option value="2">Good</option>
            <option value="3" selected>Very Good</option>

        </select>

        <label>Weather</label>

        <select name="weather">

            <option value="0">Cloudy</option>
            <option value="1">Rainy</option>
            <option value="2">Stormy</option>
            <option value="3" selected>Sunny</option>
            <option value="4">Windy</option>

        </select>

        <label>Traffic Condition</label>

        <select name="traffic">

            <option value="0">Congested Traffic</option>
            <option value="1">Dense Traffic</option>
            <option value="2" selected>Flow Traffic</option>

        </select>

        <button type="submit">Predict Fare</button>

        <button type="reset" class="reset-btn">

            Clear Form

        </button>

    </form>

    {% if prediction_text %}

    <div class="result">

        <h3>{{ prediction_text }}</h3>

    </div>

    {% endif %}

    <footer>

        <p>Machine Learning Deployment Project using Flask</p>

    </footer>

</div>

</body>

</html>
