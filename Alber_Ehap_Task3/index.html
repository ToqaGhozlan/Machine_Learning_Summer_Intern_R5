<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Uber Fare Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay"></div>

<div class="container py-5">

<div class="hero text-center mb-5">

<i class="fa-solid fa-taxi hero-icon"></i>

<h1>

Uber Fare Prediction

</h1>

<p>

Predict your taxi fare instantly using Machine Learning

</p>

</div>


<div class="glass-card">

<form action="/predict" method="POST">

<div class="row">

<!-- Car Condition -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-car-side"></i>

Car Condition

</label>

<select class="form-select"

name="condition"

required>

<option>Excellent</option>

<option>Very Good</option>

<option>Good</option>

<option>Bad</option>

</select>

</div>


<!-- Weather -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-cloud-sun"></i>

Weather

</label>

<select

class="form-select"

name="weather"

required>

<option>Sunny</option>

<option>Cloudy</option>

<option>Rainy</option>

<option>Windy</option>

</select>

</div>


<!-- Traffic -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-road"></i>

Traffic Condition

</label>

<select

class="form-select"

name="traffic"

required>

<option>Low Traffic</option>

<option>Medium Traffic</option>

<option>High Traffic</option>

<option>Congested Traffic</option>

</select>

</div>


<!-- Passenger -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-users"></i>

Passenger Count

</label>

<input

type="number"

class="form-control"

name="passenger_count"

min="1"

max="6"

required>

</div>


<!-- Pickup Latitude -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-location-dot"></i>

Pickup Latitude

</label>

<input

type="number"

step="any"

class="form-control"

name="pickup_latitude"

required>

</div>


<!-- Pickup Longitude -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-location-dot"></i>

Pickup Longitude

</label>

<input

type="number"

step="any"

class="form-control"

name="pickup_longitude"

required>

</div>


<!-- Dropoff Latitude -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-flag-checkered"></i>

Dropoff Latitude

</label>

<input

type="number"

step="any"

class="form-control"

name="dropoff_latitude"

required>

</div>


<!-- Dropoff Longitude -->

<div class="col-md-6 mb-4">

<label>

<i class="fa-solid fa-flag-checkered"></i>

Dropoff Longitude

</label>

<input

type="number"

step="any"

class="form-control"

name="dropoff_longitude"

required>

</div>


<!-- Date -->

<div class="col-12 mb-4">

<label>

<i class="fa-solid fa-calendar-days"></i>

Pickup Date & Time

</label>

<input

type="datetime-local"

class="form-control"

name="pickup_datetime"

required>

</div>


<div class="col-12 text-center mt-4">

<button

class="predict-btn"

type="submit">

<i class="fa-solid fa-bolt"></i>

Predict Fare

</button>

</div>

</div>

</form>

</div>

<footer class="text-center mt-5">

<p>

Built with ❤️ using Flask & Machine Learning

</p>

</footer>

</div>

</body>

</html>
