 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Prediction Result</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Font Awesome -->

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
rel="stylesheet">

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-5">

<div class="hero text-center">

<i class="fa-solid fa-money-bill-wave hero-icon"></i>

<h1>

Prediction Result

</h1>

<p>

Machine Learning Prediction Completed

</p>

</div>

<div class="glass-card text-center">

{% if error %}

<div class="error-box">

<i class="fa-solid fa-circle-xmark"></i>

<h2>

Prediction Failed

</h2>

<p>

{{ error }}

</p>

</div>

{% else %}

<div class="success-box">

<i class="fa-solid fa-circle-check"></i>

<h2>

Estimated Uber Fare

</h2>

<div class="price">

${{ fare }}

</div>

<p>

Thank you for using our prediction system.

</p>

</div>

{% endif %}

<div class="mt-5">

<a href="/">

<button class="predict-btn">

<i class="fa-solid fa-arrow-left"></i>

Predict Another Ride

</button>

</a>

</div>

</div>

<footer class="text-center mt-5">

Built with ❤️ using Flask & Machine Learning

</footer>

</div>

</body>

</html>
